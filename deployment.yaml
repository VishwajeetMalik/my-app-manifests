apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - image: vishwajeet97/my-app:3
        imagePullPolicy: Always


        imagePullPolicy: Always

        ports:
        - containerPort: 3000
